<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Plinko</title>
    <style>
        body {
            background-color: #0f1923;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #ff4655;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-container {
            background-color: #1a2733;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background-color: #0f1923;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            flex-wrap: wrap;
        }

        .balance-box {
            font-size: 24px;
            font-weight: bold;
            color: #29ff5e;
            min-width: 200px;
        }

        .bet-controls {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #233446;
            padding: 15px;
            border-radius: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            color: #cbd5e1;
            font-weight: bold;
        }

        input[type="number"] {
            background: #0f1923;
            border: 2px solid #334155;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 16px;
            width: 70px;
            outline: none;
            text-align: center;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            color: white;
        }

        .btn-drop { background-color: #ff4655; }
        .btn-drop:hover { background-color: #ff5c6a; }

        .btn-turbo { 
            background-color: #facc15; 
            color: #000;
        }
        .btn-turbo:hover { background-color: #fde047; }

        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Turbo Plinko</h1>
    <div class="game-container">
        <canvas id="plinkoCanvas" width="800" height="650"></canvas>
        
        <div class="controls">
            <div class="balance-box">
                Balance: $<span id="balanceDisplay">1000.00</span>
            </div>
            
            <div class="bet-controls">
                <div class="input-group">
                    <label>Rows (4-35)</label>
                    <input type="number" id="rowCount" value="16" min="4" max="35" onchange="initBoard()">
                </div>
                <div class="input-group">
                    <label>Bet per ball</label>
                    <input type="number" id="betAmount" value="1.00" min="0.1" step="0.5">
                </div>
                <div class="btn-group">
                    <button class="btn-drop" onclick="dropBall(1)">Drop Ball</button>
                    <button class="btn-turbo" onclick="dropBall(100)">Turbo (x100)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const betInput = document.getElementById('betAmount');
        const rowInput = document.getElementById('rowCount');

        let ROWS = 16;
        let ROW_HEIGHT, COL_WIDTH, PEG_RADIUS, BALL_RADIUS;
        const START_X = canvas.width / 2;
        const START_Y = 30;
        const ANIMATION_SPEED = 0.07;

        let balance = 1000.00;
        let pegs = [];
        let multipliers = [];
        let balls = [];

        function updateUI() {
            balanceDisplay.innerText = balance.toFixed(2);
        }

        function initBoard() {
            ROWS = Math.min(Math.max(parseInt(rowInput.value) || 16, 4), 35);
            rowInput.value = ROWS;
            
            const maxHeight = canvas.height - 120;
            const maxWidth = canvas.width - 60;
            
            const baseSize = Math.min(maxWidth / ROWS, maxHeight / ROWS);
            COL_WIDTH = baseSize;
            ROW_HEIGHT = baseSize;
            
            PEG_RADIUS = Math.max(1, baseSize * 0.1);
            BALL_RADIUS = Math.max(2, baseSize * 0.3);

            pegs = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    pegs.push({
                        x: START_X + (c - r / 2) * COL_WIDTH,
                        y: START_Y + r * ROW_HEIGHT
                    });
                }
            }

            multipliers = [];
            for (let i = 0; i <= ROWS; i++) {
                const dist = Math.abs(i - ROWS / 2) / (ROWS / 2);
                let m = 0.2 + Math.pow(dist, 4) * (ROWS * 2.5); 
                multipliers.push(m < 1 ? Math.round(m * 10) / 10 : Math.round(m * 2) / 2);
            }
        }

        function dropBall(count) {
            const bet = parseFloat(betInput.value);
            const totalCost = bet * count;

            if (balance < totalCost) {
                alert("Insufficient funds for " + count + " balls!");
                return;
            }

            balance -= totalCost;
            updateUI();

            for (let n = 0; n < count; n++) {
                let path = [];
                let currentPos = 0;
                for (let i = 0; i < ROWS; i++) {
                    const dir = Math.random() < 0.5 ? 0 : 1;
                    path.push(dir);
                    currentPos += dir;
                }

                balls.push({
                    path,
                    step: 0,
                    progress: 0,
                    bet,
                    finalSlot: currentPos,
                    // Offset start times slightly for Turbo so balls don't overlap perfectly
                    delay: count > 1 ? Math.random() * 2 : 0 
                });
            }
        }

        function update() {
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                
                // Handle staggered start for turbo
                if (b.delay > 0) {
                    b.delay -= 0.1;
                    continue;
                }

                b.progress += ANIMATION_SPEED;
                if (b.progress >= 1) {
                    b.progress = 0;
                    b.step++;
                    if (b.step >= ROWS) {
                        balance += b.bet * multipliers[b.finalSlot];
                        updateUI();
                        balls.splice(i, 1);
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Pegs
            ctx.fillStyle = '#4b5563';
            pegs.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, PEG_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Multipliers
            const bottomY = START_Y + ROWS * ROW_HEIGHT + 25;
            const fontSize = Math.max(8, 200 / ROWS);
            ctx.font = `bold ${fontSize}px sans-serif`;
            
            multipliers.forEach((m, i) => {
                const x = START_X + (i - ROWS / 2) * COL_WIDTH;
                ctx.fillStyle = m >= 1 ? '#ffb029' : '#29ff5e';
                ctx.fillRect(x - (COL_WIDTH*0.4), bottomY - 10, COL_WIDTH*0.8, 20);
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                ctx.fillText(m, x, bottomY + (fontSize/3));
            });

            // Draw Balls
            ctx.shadowBlur = 4;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            balls.forEach(b => {
                if (b.delay > 0) return;
                
                let r = b.step;
                let currentC = b.path.slice(0, r).reduce((a,c) => a + c, 0);
                let nextC = currentC + b.path[r];

                let startX = START_X + (currentC - r/2) * COL_WIDTH;
                let startY = START_Y + r * ROW_HEIGHT;
                let endX = START_X + (nextC - (r+1)/2) * COL_WIDTH;
                let endY = START_Y + (r+1) * ROW_HEIGHT;

                let x = startX + (endX - startX) * b.progress;
                let y = startY + (endY - startY) * b.progress;
                y -= Math.sin(b.progress * Math.PI) * (ROW_HEIGHT * 0.4);

                ctx.fillStyle = '#ff4655';
                ctx.beginPath();
                ctx.arc(x, y, BALL_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        initBoard();
        draw();
    </script>
</body>
</html>
